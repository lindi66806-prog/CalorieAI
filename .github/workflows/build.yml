name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies & configure autoconf 2.13
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-pip python3-dev ffmpeg libssl-dev \
            libxml2-dev libxslt1-dev zlib1g-dev openjdk-17-jdk-headless \
            cmake swig git autoconf2.13 automake libtool m4
          # Remove system autoconf 2.71 and replace with 2.13
          sudo rm -f /usr/bin/autoconf /usr/bin/autoreconf /usr/bin/autoheader /usr/bin/automake /usr/bin/aclocal
          sudo rm -f /usr/local/bin/autoconf /usr/local/bin/autoreconf /usr/local/bin/autoheader
          sudo ln -sf /usr/bin/autoconf2.13 /usr/bin/autoconf
          sudo ln -sf /usr/bin/autoreconf2.13 /usr/bin/autoreconf
          sudo ln -sf /usr/bin/autoheader2.13 /usr/bin/autoheader
          # Create wrapper script that strips --include-deps from any autoreconf call
          # (autogen.sh calls autoreconf with args; we intercept via PATH)
          echo '#!/bin/bash
          args=()
          skip_next=false
          for arg in "$@"; do
            if [ "" = true ]; then
              skip_next=false
              continue
            fi
            if [ "" = "--include-deps" ]; then
              skip_next=true
              continue
            fi
            args+=("")
          done
          exec /usr/bin/autoreconf ""' | sudo tee /usr/local/bin/autoreconf_wrapper > /dev/null
          sudo chmod +x /usr/local/bin/autoreconf_wrapper
          # Point the build environment PATH to use wrapper first
          echo '/usr/local/bin/autoreconf_wrapper:' >> 
          echo 'autoreconf wrapper installed'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install cython
          pip install buildozer==1.5.0 kivy==2.3.0
          pip install python-for-android

      - name: Build debug APK
        env:
          BUILDZER_SPEC: buildozer.spec
          PATH: '/usr/local/bin/autoreconf_wrapper:'
        run: |
          # Verify
          which autoreconf
          autoreconf --version 2>&1 | head -1
          # Run build
          buildozer android debug
          ls -la bin/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CalorieAI-debug-APK
          path: bin/*.apk