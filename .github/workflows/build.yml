name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-pip python3-dev ffmpeg libssl-dev \
            libxml2-dev libxslt1-dev zlib1g-dev openjdk-17-jdk-headless \
            cmake swig git autoconf2.13 automake libtool m4

      - name: Create autoreconf wrapper (NO system file modification)
        run: |
          set -e
          # Write wrapper to /usr/local/bin (already in PATH before /usr/bin)
          # This wrapper strips --include-deps and delegates to autoreconf2.13
          cat > /tmp/autoreconf_wrapper.sh << 'ENDOFWRAPPER'
          #!/bin/bash
          ARGS=()
          SKIP_NEXT=false
          for ARG in "$@"; do
            if [ "" = "true" ]; then
              SKIP_NEXT=false
              continue
            fi
            case "" in
              --include-deps|--include-dep) SKIP_NEXT=true ;;
              *) ARGS+=("") ;;
            esac
          done
          exec /usr/bin/autoreconf2.13 ""
          ENDOFWRAPPER

          sudo mv /tmp/autoreconf_wrapper.sh /usr/local/bin/autoreconf
          sudo chmod +x /usr/local/bin/autoreconf

          # Verify wrapper is in PATH and works
          echo "=== which autoreconf ==="
          which autoreconf
          echo "=== autoreconf version ==="
          autoreconf --version 2>&1 | head -1

      - name: Install Python dependencies
        run: |
          set -e
          pip install --upgrade pip
          pip install cython
          pip install buildozer==1.5.0 kivy==2.3.0
          pip install python-for-android

      - name: Build debug APK
        env:
          BUILDZER_SPEC: buildozer.spec
        run: |
          set -e
          # Confirm our wrapper is being used
          echo "=== Build step: which autoreconf ==="
          which autoreconf
          echo "=== Build step: autoreconf --version ==="
          autoreconf --version 2>&1 | head -1
          buildozer android debug
          ls -la bin/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CalorieAI-debug-APK
          path: bin/*.apk