name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-pip python3-dev ffmpeg libssl-dev \
            libxml2-dev libxslt1-dev zlib1g-dev openjdk-17-jdk-headless \
            cmake swig git autoconf2.13 automake libtool m4

      - name: Patch autoreconf to strip --include-deps
        run: |
          set -e
          # Replace system autoreconf with v2.13
          sudo rm -f /usr/bin/autoconf /usr/bin/autoreconf /usr/bin/autoheader
          sudo ln -sf /usr/bin/autoconf2.13 /usr/bin/autoconf
          sudo ln -sf /usr/bin/autoreconf2.13 /usr/bin/autoreconf
          sudo ln -sf /usr/bin/autoheader2.13 /usr/bin/autoheader

          # Use printf to write wrapper script (avoids PowerShell variable expansion)
          # This wrapper strips --include-deps from all autoreconf calls
          sudo printf '#!/bin/bash\nargs=()\nskip_next=false\nfor arg in "$@"; do\n  if [ "" = true ]; then\n    skip_next=false\n    continue\n  fi\n  case "" in\n    --include-deps) skip_next=true ;;\n    --include-dep) skip_next=true ;;\n    *) args+=("") ;;\n  esac\ndone\nexec /usr/bin/autoreconf2.13 ""' > /tmp/fix_autoreconf.sh
          sudo mv /tmp/fix_autoreconf.sh /usr/local/bin/fix_autoreconf
          sudo chmod +x /usr/local/bin/fix_autoreconf

          # OVERWRITE /usr/bin/autoreconf with our patched version
          sudo cp /usr/local/bin/fix_autoreconf /usr/bin/autoreconf

          # Verify
          echo "=== autoreconf version ==="
          autoreconf --version 2>&1 | head -1
          echo "=== which autoreconf ==="
          which autoreconf

      - name: Install Python dependencies
        run: |
          set -e
          pip install --upgrade pip
          pip install cython
          pip install buildozer==1.5.0 kivy==2.3.0
          pip install python-for-android

      - name: Build debug APK
        env:
          BUILDZER_SPEC: buildozer.spec
        run: |
          set -e
          which autoreconf
          autoreconf --version 2>&1 | head -1
          buildozer android debug
          ls -la bin/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CalorieAI-debug-APK
          path: bin/*.apk