name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-pip python3-dev ffmpeg libssl-dev \
            libxml2-dev libxslt1-dev zlib1g-dev openjdk-17-jdk-headless \
            cmake swig git autoconf2.13 automake libtool m4

      - name: Create autoreconf wrapper via base64
        run: |
          set -e
          echo '' | base64 -d | sudo tee /usr/local/bin/autoreconf > /dev/null
          sudo chmod +x /usr/local/bin/autoreconf
          echo "=== which autoreconf ==="
          which autoreconf
          echo "=== autoreconf --version ==="
          autoreconf --version 2>&1 | head -1
          echo "=== test: autoreconf -f 2>&1 | head -3 ==="
          autoreconf -f 2>&1 | head -3

      - name: Install Python dependencies
        run: |
          set -e
          pip install --upgrade pip
          pip install cython
          pip install buildozer==1.5.0 kivy==2.3.0
          pip install python-for-android

      - name: Build debug APK
        env:
          BUILDZER_SPEC: buildozer.spec
        run: |
          set -e
          echo "=== Build: which autoreconf ==="
          which autoreconf
          echo "=== Build: autoreconf --version ==="
          autoreconf --version 2>&1 | head -1
          buildozer android debug
          ls -la bin/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CalorieAI-debug-APK
          path: bin/*.apk
