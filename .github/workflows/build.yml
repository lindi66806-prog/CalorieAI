name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Force replace autoconf with v2.13
        run: |
          # First install system dependencies
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-pip python3-dev ffmpeg libssl-dev \
            libxml2-dev libxslt1-dev zlib1g-dev openjdk-17-jdk-headless \
            cmake swig git autoconf2.13 automake libtool m4
          # Remove old autoconf completely and replace with v2.13
          sudo rm -f /usr/bin/autoconf /usr/bin/autoreconf /usr/bin/autoheader /usr/bin/automake /usr/bin/aclocal
          sudo cp /usr/bin/autoconf2.13 /usr/bin/autoconf
          sudo cp /usr/bin/autoreconf2.13 /usr/bin/autoreconf
          # Verify
          which autoconf autoreconf
          autoconf --version | head -1
          autoreconf --version | head -1

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install cython
          pip install buildozer==1.5.0
          pip install kivy==2.3.0

      - name: Install Android SDK & NDK (via p4a)
        run: |
          pip install python-for-android

      - name: Build debug APK
        env:
          BUILDZER_SPEC: buildozer.spec
        run: |
          # Verify which autoconf
          which autoconf autoreconf
          autoconf --version | head -1
          autoreconf --version | head -1
          # Run build
          buildozer android debug
          ls -la bin/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CalorieAI-debug-APK
          path: bin/*.apk