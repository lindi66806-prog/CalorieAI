name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-pip python3-dev ffmpeg libssl-dev \
            libxml2-dev libxslt1-dev zlib1g-dev openjdk-17-jdk-headless \
            cmake swig git autoconf2.13 automake libtool m4

      - name: Install Python dependencies
        run: |
          set -e
          pip install --upgrade pip
          pip install cython
          pip install buildozer==1.5.0 kivy==2.3.0
          pip install python-for-android
          echo "=== Find p4a libffi recipe ==="
          find /opt/hostedtoolcache/Python/3.11.15/x64/lib -name "libffi" -type d 2>/dev/null | xargs -I {} find {} -name "__init__.py" | grep libffi
          echo "=== Patch p4a libffi recipe ==="
          # Find the installed p4a libffi recipe path
          P4A_RECIPE=$(find /opt/hostedtoolcache/Python/3.11.15/x64/lib -path "*/pythonforandroid/recipes/libffi/__init__.py" 2>/dev/null | head -1)
          if [ -z "$P4A_RECIPE" ]; then
            echo "p4a recipe not found, trying another path..."
            P4A_RECIPE=$(python3 -c "import pythonforandroid; import os; print(os.path.join(os.path.dirname(pythonforandroid.__file__), 'recipes', 'libffi', '__init__.py'))")
          fi
          echo "Patching $P4A_RECIPE"
          # Replace the autogen.sh call with autoreconf2.13 -fi
          sed -i "s|sh.Command('./autogen.sh')|sh.Command('/usr/bin/autoreconf2.13', '-fi')|g" "$P4A_RECIPE"
          # Verify patch
          grep "autoreconf2.13" "$P4A_RECIPE" && echo "Patch successful" || echo "Patch failed"

      - name: Build debug APK
        env:
          BUILDZER_SPEC: buildozer.spec
        run: |
          set -e
          buildozer android debug
          ls -la bin/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CalorieAI-debug-APK
          path: bin/*.apk
