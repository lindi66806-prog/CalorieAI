name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies + configure autoreconf wrapper
        run: |
          set -e
          # Install system dependencies
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-pip python3-dev ffmpeg libssl-dev \
            libxml2-dev libxslt1-dev zlib1g-dev openjdk-17-jdk-headless \
            cmake swig git autoconf2.13 automake libtool m4

          # Replace system autoconf with v2.13
          sudo rm -f /usr/bin/autoconf /usr/bin/autoreconf /usr/bin/autoheader
          sudo ln -sf /usr/bin/autoconf2.13 /usr/bin/autoconf
          sudo ln -sf /usr/bin/autoreconf2.13 /usr/bin/autoreconf
          sudo ln -sf /usr/bin/autoheader2.13 /usr/bin/autoheader

          # Create wrapper that intercepts ALL autoreconf calls and strips --include-deps
          # (autogen.sh calls autoreconf with args, and autoreconf itself calls autoconf internally)
          WRAPPER=/usr/local/bin/autoreconf
          cat > /tmp/autoreconf-wrapper.sh << 'WRAPPER_SCRIPT'
          #!/bin/bash
          args=()
          skip_next=false
          for arg in "$@"; do
            if [ "" = true ]; then
              skip_next=false
              continue
            fi
            case "" in
              --include-deps)
                skip_next=true
                ;;
              --include-dep)
                skip_next=true
                ;;
              *)
                args+=("")
                ;;
            esac
          done
          exec /usr/bin/autoreconf ""
          WRAPPER_SCRIPT
          sudo mv /tmp/autoreconf-wrapper.sh 
          sudo chmod +x 

          # Use update-alternatives to make our wrapper the system default
          sudo update-alternatives --install /usr/bin/autoreconf autoreconf  100

          # Verify
          echo "=== autoreconf version ==="
          autoreconf --version 2>&1 | head -1
          echo "=== which autoreconf ==="
          which autoreconf

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install cython
          pip install buildozer==1.5.0 kivy==2.3.0
          pip install python-for-android

      - name: Build debug APK
        env:
          BUILDZER_SPEC: buildozer.spec
        run: |
          which autoreconf
          autoreconf --version 2>&1 | head -1
          buildozer android debug
          ls -la bin/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CalorieAI-debug-APK
          path: bin/*.apk